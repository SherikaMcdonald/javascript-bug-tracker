<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JavaScript Bug Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Bug Tracker</h1>
    <p class="subtitle">Track and manage software bugs.</p>

    <div class="form-section">
      <input type="text" id="bugInput" placeholder="Enter bug description">
      <button id="addBugButton">Add Bug</button>
    </div>

    <ul id="bugList"></ul>
  </div>

  <script src="script.js"></script>
</body>
</html>
